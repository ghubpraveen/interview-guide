<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Senior DevOps Interview Handbook</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --header: #0f172a;
            --text: #1e293b;
            --border: #e2e8f0;
            --section: #e2e8f0;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --header: #020617;
            --text: #f1f5f9;
            --border: #334155;
            --section: #334155;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--header);
            color: white;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .section {
            background: var(--card);
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .section-title {
            background: var(--section);
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .section-content {
            display: block;
        }

        .question {
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .question h4 {
            margin-bottom: 10px;
        }

        .answer {
            color: var(--text);
            line-height: 1.7;
            white-space: pre-line;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }

        @media(max-width:768px) {
            .toolbar {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>🚀 DevOps Handbook</h1>
        <p>
            Jenkins • Kubernetes • Terraform • AWS • GCP • Reliability • Incident Management
        </p>
    </header>

    <div class="container">

        <div class="toolbar">

            <input id="searchBox" class="search-box" type="text" placeholder="Search questions...">

            <button onclick="expandAll()">
                Expand All
            </button>

            <button onclick="collapseAll()">
                Collapse All
            </button>

            <button onclick="toggleTheme()">
                Dark Mode
            </button>

        </div>

        <div id="content">
            Loading questions...
        </div>

    </div>

    <footer>
        Lavu Praveen Babu • DevOps Guide
    </footer>

    <script>
        function expandAll() {
            document
                .querySelectorAll(".section-content")
                .forEach(el => el.style.display = "block");
        }

        function collapseAll() {
            document
                .querySelectorAll(".section-content")
                .forEach(el => el.style.display = "none");
        }

        function toggleTheme() {
            document.body.classList.toggle("dark");
        }

        document.addEventListener("click", (e) => {

            if (
                e.target.classList.contains("section-title")
            ) {

                const content =
                    e.target.nextElementSibling;

                content.style.display =
                    content.style.display === "none"
                        ? "block"
                        : "none";
            }
        });

        document.addEventListener("input", (e) => {

            if (e.target.id !== "searchBox")
                return;

            const value =
                e.target.value.toLowerCase();

            document
                .querySelectorAll(".question")
                .forEach(q => {

                    const text =
                        q.innerText.toLowerCase();

                    q.style.display =
                        text.includes(value)
                            ? "block"
                            : "none";
                });
        });
    </script>

    <script type="module" src="app.js"></script>

</body>

</html>
